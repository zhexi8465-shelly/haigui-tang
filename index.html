<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🐢 海龟汤小游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1929 100%);
      position: relative;
      overflow-x: hidden;
      font-family: 'Arial', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 60% 70%, white, transparent),
        radial-gradient(1px 1px at 50% 50%, white, transparent),
        radial-gradient(1px 1px at 80% 10%, white, transparent),
        radial-gradient(2px 2px at 90% 60%, white, transparent),
        radial-gradient(1px 1px at 33% 80%, white, transparent),
        radial-gradient(1px 1px at 15% 55%, white, transparent);
      background-size: 200% 200%;
      animation: stars 60s linear infinite;
      opacity: 0.6;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(100, 200, 255, 0.1) 0%, transparent 50%);
      animation: fog 20s ease-in-out infinite;
      z-index: 1;
    }

    @keyframes stars {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-50%, -50%); }
    }

    @keyframes fog {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(10%, 10%) scale(1.1); opacity: 0.5; }
    }

    @keyframes glow {
      0%, 100% { text-shadow: 0 0 10px rgba(100, 200, 255, 0.8), 0 0 20px rgba(100, 200, 255, 0.6), 0 0 30px rgba(100, 200, 255, 0.4); }
      50% { text-shadow: 0 0 20px rgba(100, 200, 255, 1), 0 0 30px rgba(100, 200, 255, 0.8), 0 0 40px rgba(100, 200, 255, 0.6); }
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      color: #ffffff;
      font-size: 36px;
      margin-bottom: 30px;
      animation: glow 2s ease-in-out infinite;
      letter-spacing: 2px;
    }

    .turtle-icon {
      font-size: 48px;
      display: block;
      text-align: center;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .rules {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #e0e0e0;
      line-height: 1.8;
    }

    .rules h3 {
      color: #64c8ff;
      margin-bottom: 15px;
      font-size: 20px;
    }

    .rules p {
      margin-bottom: 10px;
      font-size: 15px;
    }

    .tangmian {
      font-size: 18px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
      border: 2px solid rgba(100, 200, 255, 0.3);
      color: #ffffff;
      line-height: 1.8;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .tangmian strong {
      color: #64c8ff;
      font-size: 20px;
      display: block;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 2px solid rgba(100, 200, 255, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #ffffff;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    input:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 0.6);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
    }

    button {
      padding: 12px 30px;
      background: linear-gradient(135deg, #0070f3, #00a0ff);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 112, 243, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 112, 243, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .answer {
      margin-top: 20px;
      font-size: 18px;
      padding: 20px;
      background: rgba(255, 100, 100, 0.2);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 100, 100, 0.4);
      border-radius: 15px;
      color: #ffcccc;
      line-height: 1.8;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .answer strong {
      color: #ff6b6b;
      font-size: 20px;
      display: block;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="turtle-icon">🐢</span>
    <h1>海龟汤小游戏</h1>

    <div class="rules">
      <h3>游戏规则</h3>
      <p><strong>1.</strong> 仔细阅读下方的"汤面"（谜题）</p>
      <p><strong>2.</strong> 通过提问来推理出真相，但只能问"是"或"不是"的问题</p>
      <p><strong>3.</strong> 根据回答逐步缩小范围，直到找出答案</p>
      <p><strong>4.</strong> 实在猜不出可以点击"查看答案"按钮</p>
    </div>

    <div class="tangmian">
      <strong>汤面：</strong>
      一个人躺在床上睡不着，打了一个电话，没说话就挂了，然后睡着了。
    </div>

    <input type="text" id="question" placeholder="输入你的问题（只能问是/不是类）">
    <button onclick="ask()">提问</button>
    <button onclick="showAnswer()">查看答案</button>

    <div class="answer" id="answer" style="display:none">
      <strong>汤底：</strong>
      邻居打呼噜太吵，他打电话把邻居吵醒，呼噜停了，他就睡着了。
    </div>
  </div>

  <script>
    function ask() {
      let q = document.getElementById("question").value.toLowerCase();
      if (q.includes("打呼噜") || q.includes("邻居") || q.includes("吵")) {
        alert("是！");
      } else {
        alert("不是 / 不重要");
      }
    }

    function showAnswer() {
      document.getElementById("answer").style.display = "block";
    }
  </script>

</body>
</html>
